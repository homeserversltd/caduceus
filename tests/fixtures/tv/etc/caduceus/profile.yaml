schema: caduceus.profile.v1
profile: tv
capability:
  household_verifying_key: "d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a"
  default_ttl_seconds: 60
commands:
- hyalos reflect
- hyalos append
- hyalos tail
- identity show
- profile show
- health
- update status
- update now
- update service status
- update service toggle
- pjlink devices
- pjlink power status
- pjlink power set
- pjlink scan
- pjlink known-products
- pjlink known add
- pjlink known remove
- staff intent
- cert trust-install
- cert status
- config path
- config show
- config get
- config set
- config patch
services:
  update:
    timer: harmonia-tv.timer
    latest_receipt: /var/lib/harmonia/receipts/tv-latest/run.json
harmonia_routes:
  update_now:
    bin: /usr/local/bin/harmonia
    args:
    - run-profile
    - /etc/harmonia/profiles/tv/index.json
    - --apply
    - --receipt-dir
    - /var/lib/harmonia/receipts/tv-latest

pjlink:
  catalog_path: var/lib/caduceus/pjlink-known-products.jsonl
  devices:
    - id: living-room-tv
      host: 192.168.123.17
      port: 4352
      timeout_ms: 250
      known_product:
        manufacturer: HOMESERVER
        productName: Living Room TV
        otherInfo: Fixture PJLink display
        class: "1"
